spring.application.name=demo
server.port = 8080

#\u6570\u636E\u5E93\u8FDE\u63A5\u914D\u7F6E
spring.datasource.url=jdbc:mysql://localhost:3306/java_practice?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.jdbc.Driver

#MyBatis \u914D\u7F6E
mybatis.mapper-locations=classpath:mapper/*.xml
mybatis.type-aliases-package=com.example.demo.entity
mybatis.configuration.map-underscore-to-camel-case=true

# Redis \u914D\u7F6E
spring.redis.host=127.0.0.1
spring.redis.port=6379
spring.redis.database=0
# \u53EF\u9009\uFF1A\u8FDE\u63A5\u8D85\u65F6\u65F6\u95F4
spring.redis.timeout=2000ms
# \u53EF\u9009\uFF1A\u8FDE\u63A5\u6C60\u914D\u7F6E\uFF08Spring Boot 2.x \u9ED8\u8BA4\u4F7F\u7528 Lettuce\uFF0C\u8FDE\u63A5\u6C60\u9ED8\u8BA4\u4E0D\u5F00\u542F\uFF0C\u53EF\u52A0\uFF09
spring.redis.lettuce.pool.max-active=8
spring.redis.lettuce.pool.max-idle=8
spring.redis.lettuce.pool.min-idle=0

# MongoDB \u8FDE\u63A5\u914D\u7F6E
spring.data.mongodb.host=localhost
spring.data.mongodb.port=27017
spring.data.mongodb.database=userdb